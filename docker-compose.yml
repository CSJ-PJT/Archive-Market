services:
  archive-market-postgres:
    image: postgres:16-alpine
    container_name: archive-market-postgres
    environment:
      POSTGRES_DB: ${MARKET_DB_NAME:?MARKET_DB_NAME is required}
      POSTGRES_USER: ${MARKET_DB_USERNAME:?MARKET_DB_USERNAME is required}
      POSTGRES_PASSWORD: ${MARKET_DB_PASSWORD:?MARKET_DB_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - archive-market-postgres-data:/var/lib/postgresql/data

  archive-market:
    build: .
    container_name: archive-market
    depends_on:
      archive-market-postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      DB_URL: jdbc:postgresql://archive-market-postgres:5432/${MARKET_DB_NAME:?MARKET_DB_NAME is required}
      DB_USERNAME: ${MARKET_DB_USERNAME:?MARKET_DB_USERNAME is required}
      DB_PASSWORD: ${MARKET_DB_PASSWORD:?MARKET_DB_PASSWORD is required}
      NEXUS_BASE_URL: http://host.docker.internal:8080
      LEDGER_BASE_URL: http://host.docker.internal:18080
      ARCHIVEOS_BASE_URL: http://host.docker.internal:4100
      ARCHIVE_TOKEN_MARKET_TO_NEXUS: ${ARCHIVE_TOKEN_MARKET_TO_NEXUS:-}
      ARCHIVE_TOKEN_MARKET_TO_LEDGER: ${ARCHIVE_TOKEN_MARKET_TO_LEDGER:-}
      ARCHIVE_TOKEN_MARKET_TO_OS: ${ARCHIVE_TOKEN_MARKET_TO_OS:-}
      ARCHIVE_TOKEN_AUTHENTICATED_READ: ${ARCHIVE_TOKEN_AUTHENTICATED_READ:-}
      ARCHIVE_TOKEN_ADMIN_OPERATOR: ${ARCHIVE_TOKEN_ADMIN_OPERATOR:-}
      ARCHIVE_SECURITY_ENABLED: ${ARCHIVE_SECURITY_ENABLED:-false}
      ARCHIVE_SECURITY_ALLOWED_ORIGINS: ${ARCHIVE_SECURITY_ALLOWED_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173}
      MARKET_INTEGRATION_ENABLED: "false"
      MARKET_INTERNAL_SYNTHETIC_PUBLISH_ENABLED: "true"
      MARKET_OUTBOX_SCHEDULER_ENABLED: "true"
      MARKET_OUTBOX_SCHEDULER_BATCH_SIZE: "10"
    ports:
      - "127.0.0.1:8094:8094"

volumes:
  archive-market-postgres-data:
