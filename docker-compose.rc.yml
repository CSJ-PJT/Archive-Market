services:
  archive-market:
    environment:
      SPRING_PROFILES_ACTIVE: rc
      MARKET_DB_NAME: ${MARKET_DB_NAME:?MARKET_DB_NAME is required for rc}
      MARKET_DB_USERNAME: ${MARKET_DB_USERNAME:?MARKET_DB_USERNAME is required for rc}
      MARKET_DB_PASSWORD: ${MARKET_DB_PASSWORD:?MARKET_DB_PASSWORD is required for rc}
      ARCHIVE_SECURITY_ENABLED: "true"
      ARCHIVE_TOKEN_MARKET_TO_NEXUS: ${ARCHIVE_TOKEN_MARKET_TO_NEXUS:?ARCHIVE_TOKEN_MARKET_TO_NEXUS is required for rc}
      ARCHIVE_TOKEN_MARKET_TO_LEDGER: ${ARCHIVE_TOKEN_MARKET_TO_LEDGER:?ARCHIVE_TOKEN_MARKET_TO_LEDGER is required for rc}
      ARCHIVE_TOKEN_MARKET_TO_OS: ${ARCHIVE_TOKEN_MARKET_TO_OS:?ARCHIVE_TOKEN_MARKET_TO_OS is required for rc}
      ARCHIVE_TOKEN_AUTHENTICATED_READ: ${ARCHIVE_TOKEN_AUTHENTICATED_READ:?ARCHIVE_TOKEN_AUTHENTICATED_READ is required for rc}
      ARCHIVE_TOKEN_ADMIN_OPERATOR: ${ARCHIVE_TOKEN_ADMIN_OPERATOR:?ARCHIVE_TOKEN_ADMIN_OPERATOR is required for rc}
