server:
  port: 8094

spring:
  application:
    name: archive-market
  profiles:
    default: local
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
  batch:
    jdbc:
      initialize-schema: never
    job:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  metrics:
    tags:
      application: archive-market

market:
  integration:
    enabled: false
    nexus:
      base-url: ${NEXUS_BASE_URL:http://host.docker.internal:8080}
      publish-path: /api/events/external
    ledger:
      base-url: ${LEDGER_BASE_URL:http://host.docker.internal:18080}
      publish-path: /api/events/external
    archiveos:
      base-url: ${ARCHIVEOS_BASE_URL:http://host.docker.internal:5173}
      publish-path: /api/ecosystem/events
  outbox:
    scheduler:
      enabled: false

archive:
  runtime:
    autorun:
      enabled: ${ARCHIVE_RUNTIME_AUTORUN_ENABLED:true}
      scheduler-enabled: ${ARCHIVE_RUNTIME_SCHEDULER_ENABLED:true}
    tick-interval: ${ARCHIVE_RUNTIME_TICK_INTERVAL:30s}
    max-events-per-tick: ${ARCHIVE_RUNTIME_MAX_EVENTS_PER_TICK:10}
    max-backlog-per-tick: ${ARCHIVE_RUNTIME_MAX_BACKLOG_PER_TICK:50}
  market:
    profitability:
      enabled: true
      block-low-margin-orders: false
      send-review-events: true
      accept-margin-rate: 15.0
      review-margin-rate: 5.0
      reject-margin-rate: 5.0
      accept-risk-score: 0.6
      high-risk-score: 0.75
      large-order-threshold: 3000000
      return-review-probability: 0.3
      claim-review-probability: 0.2
      payment-processing-fee-rate: 0.020
      ledger-settlement-fee-rate: 0.003
      ledger-fixed-fee: 100
      basic-logistics-estimate: 50000
      urgent-logistics-surcharge-estimate: 30000
      cold-chain-estimate: 80000
      return-cost-factor: 0.5
      claim-cost-factor: 0.4
      market-operation-cost-rate: 0.010
      customer-acquisition-cost:
        RETAIL_CUSTOMER: 5000
        B2B_CUSTOMER: 20000
        VIP_CUSTOMER: 30000
        HIGH_RISK_CUSTOMER: 10000
        DISCOUNT_SEEKER: 7000
        RETURN_PRONE_CUSTOMER: 8000
      default-discount-rate:
        DISCOUNT_SEEKER: 0.10
        VIP_CUSTOMER: 0.05
        B2B_CUSTOMER: 0.03
