server:
  port: 8094
  max-http-request-header-size: 16KB
  tomcat:
    max-swallow-size: 1MB

spring:
  application:
    name: archive-market
  profiles:
    default: local
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
  batch:
    jdbc:
      initialize-schema: never
    job:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  metrics:
    tags:
      application: archive-market

archive:
  security:
    enabled: ${ARCHIVE_SECURITY_ENABLED:false}
    max-payload-bytes: ${ARCHIVE_SECURITY_MAX_PAYLOAD_BYTES:1048576}
    max-batch-items: ${ARCHIVE_SECURITY_MAX_BATCH_ITEMS:100}
    max-writes-per-minute: ${ARCHIVE_SECURITY_MAX_WRITES_PER_MINUTE:60}
    allowed-origins: ${ARCHIVE_SECURITY_ALLOWED_ORIGINS:http://127.0.0.1:5173,http://localhost:5173}
    authenticated-read-token: ${ARCHIVE_TOKEN_AUTHENTICATED_READ:}
    admin-operator-token: ${ARCHIVE_TOKEN_ADMIN_OPERATOR:}
  tokens:
    market-to-nexus: ${ARCHIVE_TOKEN_MARKET_TO_NEXUS:}
    market-to-ledger: ${ARCHIVE_TOKEN_MARKET_TO_LEDGER:}
    market-to-os: ${ARCHIVE_TOKEN_MARKET_TO_OS:}

market:
  integration:
    enabled: false
    internal-synthetic-publish-enabled: ${MARKET_INTERNAL_SYNTHETIC_PUBLISH_ENABLED:false}
    nexus:
      base-url: ${NEXUS_BASE_URL:http://host.docker.internal:8080}
      publish-path: /api/events/market
    ledger:
      base-url: ${LEDGER_BASE_URL:http://host.docker.internal:18080}
      publish-path: /api/events/market
    archiveos:
      base-url: ${ARCHIVEOS_BASE_URL:http://host.docker.internal:4100}
      publish-path: ${ARCHIVEOS_PUBLISH_PATH:/api/live-flow/events/ingest}
  outbox:
    max-retry-count: ${MARKET_OUTBOX_MAX_RETRY_COUNT:5}
    scheduler:
      enabled: ${MARKET_OUTBOX_SCHEDULER_ENABLED:false}
      fixed-delay-ms: ${MARKET_OUTBOX_SCHEDULER_FIXED_DELAY_MS:10000}
      batch-size: ${MARKET_OUTBOX_SCHEDULER_BATCH_SIZE:10}

  runtime:
    autorun:
      enabled: ${ARCHIVE_RUNTIME_AUTORUN_ENABLED:true}
      scheduler-enabled: ${ARCHIVE_RUNTIME_SCHEDULER_ENABLED:true}
    tick-interval: ${ARCHIVE_RUNTIME_TICK_INTERVAL:30s}
    max-events-per-tick: ${ARCHIVE_RUNTIME_MAX_EVENTS_PER_TICK:10}
    max-backlog-per-tick: ${ARCHIVE_RUNTIME_MAX_BACKLOG_PER_TICK:50}
  market:
    profitability:
      enabled: true
      block-low-margin-orders: false
      send-review-events: true
      accept-margin-rate: 15.0
      review-margin-rate: 5.0
      reject-margin-rate: 5.0
      accept-risk-score: 0.6
      high-risk-score: 0.75
      large-order-threshold: 3000000
      return-review-probability: 0.3
      claim-review-probability: 0.2
      payment-processing-fee-rate: 0.020
      ledger-settlement-fee-rate: 0.003
      ledger-fixed-fee: 100
      basic-logistics-estimate: 50000
      urgent-logistics-surcharge-estimate: 30000
      cold-chain-estimate: 80000
      return-cost-factor: 0.5
      claim-cost-factor: 0.4
      market-operation-cost-rate: 0.010
      customer-acquisition-cost:
        RETAIL_CUSTOMER: 5000
        B2B_CUSTOMER: 20000
        VIP_CUSTOMER: 30000
        HIGH_RISK_CUSTOMER: 10000
        DISCOUNT_SEEKER: 7000
        RETURN_PRONE_CUSTOMER: 8000
      default-discount-rate:
        DISCOUNT_SEEKER: 0.10
        VIP_CUSTOMER: 0.05
        B2B_CUSTOMER: 0.03
